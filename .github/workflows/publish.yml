name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify npm supports OIDC
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"

      - run: npm publish --provenance --access public
